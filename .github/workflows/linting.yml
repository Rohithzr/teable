name: Linting and Types

on:
  pull_request:
    branches: [f-v1.18]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: ./.github/actions/pnpm-install
      - run: pnpm g:lint
